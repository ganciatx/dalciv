<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Active Police Calls Map - Dallas, TX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="/static/police_desk_ops.css" />
</head>

<body>
  <div id="app">
    <header id="topbar" class="desk-topbar" aria-label="Status bar"></header>
    <div id="alert-ribbon" hidden aria-live="polite"></div>

    <div class="main-grid">
      <div class="map-col">
        <div id="map" role="application" aria-label="Map of active police calls"></div>

        <div id="filter-bar">
          <div class="surface" style="display:flex;align-items:center;gap:8px;padding:6px 10px 6px 12px;width:min(360px,42vw)">
            <span style="color:var(--fg-3)"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5L14 14"/></svg></span>
            <input id="search-input" type="search" placeholder="search address, type, unit, or incident #…"
              style="flex:1;background:transparent;border:0;outline:0;color:var(--fg-0);font-size:13px;font-family:var(--font-ui)" />
            <span class="kbd">⌘K</span>
          </div>
          <div class="surface" style="display:flex;padding:4px;gap:0">
            <button type="button" class="btn sm pri-btn" data-pri="1"><span class="sdot" style="background:var(--p1)"></span><span class="t-mono">P1</span></button>
            <button type="button" class="btn sm pri-btn" data-pri="2"><span class="sdot" style="background:var(--p2)"></span><span class="t-mono">P2</span></button>
            <button type="button" class="btn sm pri-btn" data-pri="3"><span class="sdot" style="background:var(--p3)"></span><span class="t-mono">P3</span></button>
            <button type="button" class="btn sm pri-btn" data-pri="4"><span class="sdot" style="background:var(--p4)"></span><span class="t-mono">P4</span></button>
          </div>
          <select id="filter-division" class="btn sm" style="font-family:var(--font-ui);max-width:140px"></select>
          <button type="button" class="btn sm on" id="hide-routine">✓ Hide routine</button>
        </div>

        <div id="zoom-controls" class="surface">
          <button type="button" class="btn ghost icon sm" id="zoom-in" title="Zoom in">+</button>
          <button type="button" class="btn ghost icon sm" id="zoom-out" title="Zoom out">−</button>
        </div>

        <div id="inspector" hidden></div>

        <div id="map-legend" class="surface">
          <div class="t-label" style="margin-bottom:8px">Legend</div>
          <div class="t-mono" style="color:var(--fg-2);margin-bottom:4px">color = priority</div>
          <div class="row gap-2" style="margin-bottom:8px">
            <span class="row gap-1"><span class="sdot" style="background:var(--p1)"></span><span class="t-mono">P1</span></span>
            <span class="row gap-1"><span class="sdot" style="background:var(--p2)"></span><span class="t-mono">P2</span></span>
            <span class="row gap-1"><span class="sdot" style="background:var(--p3)"></span><span class="t-mono">P3</span></span>
            <span class="row gap-1"><span class="sdot" style="background:var(--p4)"></span><span class="t-mono">P4</span></span>
          </div>
          <div class="t-mono" style="color:var(--fg-2);margin-bottom:4px">size = unit count</div>
          <div class="t-mono" style="color:var(--fg-2)">pulsing halo = newsworthy · dashed box = cluster</div>
        </div>

        <div id="map-stats" class="surface"></div>
      </div>

      <aside id="right-rail">
        <div class="tabs" role="tablist">
          <button type="button" class="tab on" data-tab="feed">Feed <span class="count" id="tab-count-feed">0</span></button>
          <button type="button" class="tab" data-tab="watch">Watch <span class="count" id="tab-count-watch">0</span></button>
          <button type="button" class="tab" data-tab="notes">Notes <span class="count" id="tab-count-notes">0</span></button>
          <button type="button" class="tab" data-tab="patt">Patterns <span class="count" id="tab-count-patt">0</span></button>
        </div>
        <div id="rail-body"></div>
        <div class="rail-footer t-mono" style="padding:8px 14px;border-top:1px solid var(--br-2);color:var(--fg-3);font-size:10px">
          Data: <a class="link" href="https://www.dallasopendata.com/Public-Safety/Dallas-Police-Active-Calls/9fxf-t2tr" target="_blank" rel="noopener">Dallas Open Data</a>
          · Nominatim geocode cache · ~90s refresh
        </div>
      </aside>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="/static/police_desk_ops.js"></script>
</body>

</html>
