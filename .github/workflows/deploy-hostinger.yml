# Deploy Sivic Scraper to Hostinger VPS via Docker Manager.
# Secrets: HOSTINGER_API_KEY | Variables: HOSTINGER_VM_ID
# See HOSTINGER_DEPLOY_PLAN.md
name: Deploy to Hostinger VPS

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Deploy to Hostinger VPS
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
          project-name: dalciv
          environment-variables: |
            SCRAPER_ENABLED=0
            DASHBOARD_HOST=0.0.0.0
            DASHBOARD_PORT=8765
            ACME_EMAIL=${{ vars.ACME_EMAIL }}
            FORWARDED_ALLOW_IPS=127.0.0.1,172.16.0.0/12
