# Hostinger VPS — Docker Manager / hostinger/deploy-on-vps (see HOSTINGER_DEPLOY_PLAN.md).
# Public HTTP/HTTPS is handled by Caddy; the app listens only on the internal network.
services:
  caddy:
    build: ./deploy/caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      sivic:
        condition: service_healthy

  sivic:
    build: .
    expose:
      - "8765"
    environment:
      DASHBOARD_HOST: "0.0.0.0"
      DASHBOARD_PORT: "8765"
      SCRAPER_ENABLED: "${SCRAPER_ENABLED:-0}"
      SOCRATA_APP_TOKEN: "${SOCRATA_APP_TOKEN:-}"
      FORWARDED_ALLOW_IPS: "${FORWARDED_ALLOW_IPS:-127.0.0.1,172.16.0.0/12}"
      DATA_SYNC_ENABLED: "${DATA_SYNC_ENABLED:-1}"
    volumes:
      - sivic_data:/app/scraper_dashboard_data
      - sivic_downloads:/app/dallas_legistar_downloads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8765/api/state"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  sivic_data:
  sivic_downloads:
  caddy_data:
  caddy_config:
